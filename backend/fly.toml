# Fly.io deployment configuration for HappyRobot Backend
app = "happyrobot-backend-icy-darkness-8036"
primary_region = "iad"
console_command = "/bin/bash"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENVIRONMENT = "production"
  DATABASE_URL = "sqlite:////data/happyrobot.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"

[deploy]
  release_command = "python -m app.db.migrate"

[mounts]
  source = "happyrobot_data"
  destination = "/data"
  processes = ["app"]